<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Healthy Habits">
<meta name="theme-color" content="#f2f2f7">
<title>Healthy Habits</title>
<link rel="stylesheet" href="./css/base.css">
<link rel="stylesheet" href="./css/layout.css">
<link rel="stylesheet" href="./css/components.css">
<link rel="stylesheet" href="./css/dashboard.css">
</head>
<body>
<div id="app">
  <!-- Top bar -->
  <div class="topbar">
    <span class="topbar-title">Healthy Habits</span>
    <div class="week-picker" id="weekPicker"></div>
    <div class="topbar-actions">
      <button class="topbar-btn logout" id="logoutBtn" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Content area -->
  <div id="content">
    <div class="spinner"></div>
  </div>

  <!-- Bottom tab bar -->
  <nav class="tabbar">
    <button class="tab-btn active" data-tab="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span class="tab-label">Home</span>
    </button>
    <button class="tab-btn" data-tab="workout">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <rect x="0" y="9" width="5.5" height="6" rx="2.75"/>
        <rect x="18.5" y="9" width="5.5" height="6" rx="2.75"/>
        <rect x="4.5" y="11" width="15" height="2" rx="1"/>
        <rect x="3" y="10" width="3.5" height="4" rx="1"/>
        <rect x="17.5" y="10" width="3.5" height="4" rx="1"/>
      </svg>
      <span class="tab-label">Workout</span>
    </button>
    <button class="tab-btn" data-tab="meals">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <rect x="2" y="5" width="20" height="2.5" rx="1.25"/>
        <rect x="2" y="11" width="20" height="2.5" rx="1.25"/>
        <rect x="2" y="17" width="14" height="2.5" rx="1.25"/>
      </svg>
      <span class="tab-label">Meals</span>
    </button>
    <button class="tab-btn" data-tab="dashboard">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <rect x="1" y="14" width="5" height="9" rx="1"/>
        <rect x="9.5" y="9" width="5" height="14" rx="1"/>
        <rect x="18" y="4" width="5" height="19" rx="1"/>
      </svg>
      <span class="tab-label">Dashboard</span>
    </button>
  </nav>
</div>

<!-- Import modal -->
<div class="modal-overlay" id="importModal">
  <div class="modal-panel">
    <div class="modal-handle"></div>
    <div class="modal-title">Import Weekly Plan</div>
    <textarea class="modal-textarea" id="importJson" placeholder="Paste your weekly plan JSON here..."></textarea>
    <div class="modal-error" id="importError"></div>
    <div class="modal-actions">
      <button class="modal-btn secondary" id="importCancel" type="button">Cancel</button>
      <button class="modal-btn primary" id="importSubmit" type="button">Import</button>
    </div>
  </div>
</div>

<!-- Override day modal -->
<div class="modal-overlay" id="overrideModal">
  <div class="modal-panel">
    <div class="modal-handle"></div>
    <div class="modal-title" id="overrideTitle">Replace Day</div>
    <textarea class="modal-textarea" id="overrideJson" placeholder="Paste single-day JSON here..."></textarea>
    <div class="modal-error" id="overrideError"></div>
    <div class="modal-actions">
      <button class="modal-btn secondary" id="overrideCancel" type="button">Cancel</button>
      <button class="modal-btn primary" id="overrideSubmit" type="button">Replace</button>
    </div>
  </div>
</div>

<!-- Confirm dialog container -->
<div id="confirmContainer"></div>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script type="module">
import { SUPABASE_URL } from './js/config.js';
const isConfigured = SUPABASE_URL && !SUPABASE_URL.startsWith('YOUR_');
if (isConfigured) {
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
  s.onload = () => import('./js/app.js');
  document.head.appendChild(s);
} else {
  import('./js/app.js');
}
</script>
</body>
</html>
